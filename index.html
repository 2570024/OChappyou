<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager (QR Sync Edition)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%; max-width: 480px; padding: 24px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid #f3f4f6; padding-bottom: 16px;
        }
        .header h1 { font-size: 22px; color: #111827; font-weight: 700; }
        .badge { font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 9999px; background-color: #ecfdf5; color: #059669; }
        
        /* 共有アクションエリア */
        .action-box {
            background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 12px;
            padding: 12px; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;
        }
        .action-btn {
            background: #4f46e5; color: white; border: none; padding: 8px 16px;
            font-size: 13px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s;
        }
        .action-btn:hover { background: #4338ca; }
        .action-btn.secondary { background: #4b5563; }
        .action-btn.secondary:hover { background: #374151; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none;
        }
        input[type="text"]:focus { border-color: #4f46e5; }
        .add-btn { padding: 12px 20px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; }
        
        .task-list { list-style: none; max-height: 350px; overflow-y: auto; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 12px; border-bottom: 1px solid #f3f4f6; gap: 12px; }
        .task-content { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .task-content input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4f46e5; }
        .task-text { font-size: 15px; color: #374151; word-break: break-all; }
        .task-text.completed { text-decoration: line-through; color: #9ca3af; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
        .empty-state { text-align: center; color: #9ca3af; padding: 30px 0; font-size: 14px; }
        
        /* QRモーダル */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 340px; text-align: center; }
        .modal-content h3 { font-size: 18px; margin-bottom: 10px; color: #111827; }
        .modal-content p { font-size: 13px; color: #6b7280; margin-bottom: 16px; line-height: 1.4; }
        .qrcode-container { display: flex; justify-content: center; margin: 15px 0; background: #fff; }
        .close-modal-btn { margin-top: 15px; width: 100%; padding: 10px; background: #f3f4f6; color: #4b5563; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Campus Tasks</h1>
            <span class="badge">ローカル保存</span>
        </div>

        <div class="action-box">
            <button class="action-btn" id="shareQrBtn">📱 スマホへ送る (QR)</button>
            <button class="action-btn secondary" id="copyLinkBtn">🔗 リンクをコピー</button>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="新しいタスクを入力..." maxlength="100">
            <button class="add-btn" id="addBtn">追加</button>
        </div>
        
        <div id="emptyState" class="empty-state">タスクはありません。上のフォームから追加してください。</div>
        <ul class="task-list" id="taskList"></ul>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <h3>スマホにタスクを送信</h3>
            <p>標準カメラで下のQRコードをスキャンすると、このタスクリストをスマホに一発で引き継げます！</p>
            <div class="qrcode-container" id="qrcode"></div>
            <button class="close-modal-btn" id="closeModalBtn">閉じる</button>
        </div>
    </div>

    <script>
        // 日本語対応の安全なBase64変換関数
        function utf8_to_b64(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1))); }
        function b64_to_utf8(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const shareQrBtn = document.getElementById('shareQrBtn');
        const copyLinkBtn = document.getElementById('copyLinkBtn');
        const qrModal = document.getElementById('qrModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const qrcodeContainer = document.getElementById('qrcode');
        
        let tasks = [];

        // URLパラメータからのインポートチェック
        function checkUrlImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const importData = urlParams.get('import');
            
            if (importData) {
                try {
                    const jsonStr = b64_to_utf8(importData);
                    const importedTasks = JSON.parse(jsonStr);
                    if (importedTasks && importedTasks.length > 0) {
                        if (confirm(`別の端末から ${importedTasks.length} 件のタスクが届きました。現在のリストに追加（統合）しますか？`)) {
                            tasks = tasks.concat(importedTasks);
                            saveTasks(); renderTasks();
                            alert('タスクを正常に読み込みました！');
                        }
                    }
                } catch (e) {
                    alert('データの読み込みに失敗しました。');
                }
                window.history.replaceState({}, '', window.location.pathname); // URLを綺麗にする
            }
        }

        function loadTasks() { tasks = JSON.parse(localStorage.getItem('standalone_tasks') || '[]'); }
        function saveTasks() { localStorage.setItem('standalone_tasks', JSON.stringify(tasks)); }
        function escapeHTML(text) { return text.replace(/[&<>\"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m])); }

        function renderTasks() {
            taskList.innerHTML = '';
            emptyState.style.display = tasks.length === 0 ? 'block' : 'none';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-content" onclick="toggleTask(${index})">
                        <input type="checkbox" ${task.completed ? 'checked' : ''}>
                        <span class="task-text ${task.completed ? 'completed' : ''}">${escapeHTML(task.text)}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${index})">削除</button>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;
            tasks.push({ text: text, completed: false, createdAt: new Date().toISOString() });
            taskInput.value = ''; renderTasks(); saveTasks();
        }

        function toggleTask(index) { tasks[index].completed = !tasks[index].completed; saveTasks(); renderTasks(); }
        function deleteTask(index) { tasks.splice(index, 1); saveTasks(); renderTasks(); }

        function generateShareUrl() {
            if (tasks.length === 0) { alert('共有するタスクがありません。'); return null; }
            
            // 【変更箇所】ベースURLをGitHub Pagesの公開URLに完全固定！
            const baseUrl = 'https://2570024.github.io/OChappyou/';
            
            return baseUrl + '?import=' + utf8_to_b64(JSON.stringify(tasks));
        }

        shareQrBtn.addEventListener('click', () => {
            const shareUrl = generateShareUrl();
            if (!shareUrl) return;
            qrcodeContainer.innerHTML = '';
            new QRCode(qrcodeContainer, { text: shareUrl, width: 200, height: 200, correctLevel : QRCode.CorrectLevel.L });
            qrModal.classList.add('active');
        });

        copyLinkBtn.addEventListener('click', () => {
            const shareUrl = generateShareUrl();
            if (!shareUrl) return;
            navigator.clipboard.writeText(shareUrl).then(() => {
                const oldText = copyLinkBtn.innerText; copyLinkBtn.innerText = "✅ コピー完了！";
                setTimeout(() => copyLinkBtn.innerText = oldText, 2000);
            });
        });

        closeModalBtn.addEventListener('click', () => qrModal.classList.remove('active'));

        // 【修正箇所】入力して追加するためのイベントリスナー
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // 起動時の読み込みと描画
        loadTasks(); renderTasks(); checkUrlImport();
    </script>
</body>
</html>
