<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #1f2937;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%; max-width: 480px; padding: 24px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid #f3f4f6; padding-bottom: 16px;
        }
        .header h1 { font-size: 24px; color: #111827; font-weight: bold; }
        
        /* 入力エリア */
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #4f46e5; }
        .add-btn {
            padding: 12px 20px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        .add-btn:hover { background: #4338ca; }
        
        /* タスクリスト表示エリア */
        .task-list { list-style: none; max-height: 400px; overflow-y: auto; padding-right: 4px; }
        .task-list::-webkit-scrollbar { width: 6px; }
        .task-list::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        
        .task-item {
            display: flex; align-items: center; justify-content: space-between; padding: 14px 12px; border-bottom: 1px solid #f3f4f6; gap: 12px;
        }
        .task-item:last-child { border-bottom: none; }
        
        .task-content { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .task-content input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #4f46e5; }
        .task-text { font-size: 16px; color: #374151; word-break: break-all; user-select: none; }
        .task-text.completed { text-decoration: line-through; color: #9ca3af; }
        
        .delete-btn { background: #ef4444; color: white; border: none; padding: 8px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .delete-btn:hover { background: #dc2626; }
        
        .empty-state { text-align: center; color: #9ca3af; padding: 30px 0; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Campus Tasks</h1>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="新しいタスクを入力..." maxlength="100">
            <button class="add-btn" id="addBtn">追加</button>
        </div>
        
        <div id="emptyState" class="empty-state">タスクはありません。上のフォームから追加してください。</div>
        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        
        let tasks = [];

        // 保存されたタスクの読み込み
        function loadTasks() {
            const localData = localStorage.getItem('my_simple_tasks');
            tasks = localData ? JSON.parse(localData) : [];
        }

        // タスクの保存（ブラウザに自動保存）
        function saveTasks() { 
            localStorage.setItem('my_simple_tasks', JSON.stringify(tasks)); 
        }

        // 特殊文字の無効化（安全対策）
        function escapeHTML(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // タスクを画面に表示
        function renderTasks() {
            taskList.innerHTML = '';
            if (tasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    li.innerHTML = `
                        <div class="task-content" onclick="toggleTask(${index})">
                            <input type="checkbox" ${task.completed ? 'checked' : ''}>
                            <span class="task-text ${task.completed ? 'completed' : ''}">${escapeHTML(task.text)}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${index})">削除</button>
                    `;
                    taskList.appendChild(li);
                });
            }
        }

        // 【機能1】タスクを書く（追加）
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;
            tasks.push({ text: text, completed: false });
            taskInput.value = ''; 
            taskInput.focus(); 
            saveTasks(); 
            renderTasks();
        }

        // 【機能2】タスクを消す（完了の取り消し線）
        function toggleTask(index) { 
            tasks[index].completed = !tasks[index].completed; 
            saveTasks(); 
            renderTasks(); 
        }
        
        // 【機能3】タスクを消去（完全削除）
        function deleteTask(index) { 
            tasks.splice(index, 1); 
            saveTasks(); 
            renderTasks(); 
        }

        // ボタンのクリックとエンターキーの設定
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') addTask(); 
        });

        // ページを開いた時の初期化処理
        loadTasks(); 
        renderTasks();
    </script>
</body>
</html>
