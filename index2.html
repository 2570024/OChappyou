<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1">

<title>Campus Tasks 2.0</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:
    linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:
    0 20px 40px
    rgba(0,0,0,0.2);
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.nav{
    margin-bottom:25px;
}

.nav button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    margin-right:10px;
}

.nav button:hover{
    background:#4338ca;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.card{
    background:#f8fafc;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(
        auto-fit,
        minmax(250px,1fr)
    );
    gap:15px;
}

input,
select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    cursor:pointer;
}

.task{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:10px;
}

.badge{
    background:#eef2ff;
    color:#4f46e5;
    padding:4px 10px;
    border-radius:20px;
    display:inline-block;
}

canvas{
    border:1px solid #ddd;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 Campus Tasks 2.0</h1>
<p class="subtitle">
AI学習支援タスク管理システム
</p>

<div class="nav">
<button onclick="showPage('taskPage')">
📝 タスク管理
</button>

<button onclick="showPage('aiPage')">
🤖 Campus AI
</button>
</div>
<!-- ========================= -->
<!-- タスク管理画面 -->
<!-- ========================= -->
<div id="taskPage" class="page active">

    <h2>📝 タスク管理</h2>

    <div class="card">

        <input
            type="text"
            id="taskInput"
            placeholder="課題名を入力">

        <input
            type="date"
            id="deadlineInput">

        <select id="priorityInput">
            <option value="3">高</option>
            <option value="2">中</option>
            <option value="1">低</option>
        </select>

        <button id="addBtn">
            ➕ 追加
        </button>

    </div>

    <div class="card">
        <h3>📋 タスクリスト</h3>

        <div id="taskList">
        </div>

        <div
            id="emptyState"
            style="
                color:#999;
                margin-top:15px;
            ">
            タスクはありません。
        </div>
    </div>

</div>


<!-- ========================= -->
<!-- Campus AI画面 -->
<!-- ========================= -->
<div id="aiPage" class="page">

    <h2>🤖 Campus AI Dashboard</h2>

    <div class="grid">

        <div class="card">
            <h3>達成率</h3>
            <h1 id="completionRate">
                0%
            </h1>
        </div>

        <div class="card">
            <h3>学習スコア</h3>
            <h1 id="learningScore">
                0点
            </h1>
        </div>

        <div class="card">
            <h3>レベル</h3>
            <h2 id="userLevel">
                🌱 Beginner
            </h2>
        </div>

        <div class="card">
            <h3>週間予測</h3>
            <div id="forecast">
                データなし
            </div>
        </div>

    </div>


    <!-- 円グラフ -->
    <div class="card">

        <h3>
            📈 達成率グラフ
        </h3>

        <canvas
            id="progressChart"
            width="250"
            height="250">
        </canvas>

    </div>


    <!-- 今日やるべき課題 -->
    <div class="card">

        <h3>
            📌 今日やるべき課題
        </h3>

        <div id="todayTasks">
            課題なし
        </div>

    </div>


    <!-- AIアドバイス -->
    <div class="card">

        <h3>
            🤖 AIアドバイス
        </h3>

        <div id="aiAdvice">
            課題を追加してください。
        </div>

    </div>


    <!-- 締切通知 -->
    <div class="card">

        <h3>
            ⚠ 締切通知
        </h3>

        <div id="urgentTasks">
            緊急の課題はありません。
        </div>

    </div>


    <!-- カレンダー -->
    <div class="card">

        <h3>
            📅 締切カレンダー
        </h3>

        <div id="calendar">
            課題なし
        </div>

    </div>

</div>

<script>
// =========================
// データ
// =========================
let tasks =
JSON.parse(
    localStorage.getItem(
        "campus_tasks_2"
    ) || "[]"
);

// =========================
// 要素取得
// =========================
const taskInput =
document.getElementById(
    "taskInput"
);

const deadlineInput =
document.getElementById(
    "deadlineInput"
);

const priorityInput =
document.getElementById(
    "priorityInput"
);

const addBtn =
document.getElementById(
    "addBtn"
);

const taskList =
document.getElementById(
    "taskList"
);

const emptyState =
document.getElementById(
    "emptyState"
);

// =========================
// 保存
// =========================
function saveTasks(){

    localStorage.setItem(
        "campus_tasks_2",
        JSON.stringify(tasks)
    );
}

// =========================
// ページ切替
// =========================
function showPage(page){

    document
        .getElementById("taskPage")
        .style.display = "none";

    document
        .getElementById("aiPage")
        .style.display = "none";

    document
        .getElementById(page)
        .style.display = "block";

    updateAI();
}

// =========================
// タスク追加
// =========================
function addTask(){

    const text =
        taskInput.value.trim();

    if(text === ""){

        alert(
            "課題名を入力してください"
        );

        return;
    }

    tasks.push({

        text:text,

        deadline:
        deadlineInput.value,

        priority:
        Number(
            priorityInput.value
        ),

        completed:false,

        createdAt:
        new Date()
        .toISOString()

    });

    taskInput.value = "";
    deadlineInput.value = "";

    saveTasks();
    renderTasks();
}

// =========================
// タスク削除
// =========================
function deleteTask(index){

    if(
        !confirm(
            "削除しますか？"
        )
    ){
        return;
    }

    tasks.splice(index,1);

    saveTasks();

    renderTasks();
}

// =========================
// 完了切替
// =========================
function toggleTask(index){

    tasks[index]
    .completed =
    !tasks[index]
    .completed;

    saveTasks();

    renderTasks();
}

// =========================
// 優先度表示
// =========================
function priorityText(p){

    if(p === 3)
        return "高";

    if(p === 2)
        return "中";

    return "低";
}

// =========================
// タスク一覧表示
// =========================
function renderTasks(){

    taskList.innerHTML = "";

    emptyState.style.display =
        tasks.length === 0
        ? "block"
        : "none";

    tasks.forEach(
        (task,index)=>{

        taskList.innerHTML += `

        <div class="task">

            <div>

                <input
                    type="checkbox"
                    ${
                        task.completed
                        ? "checked"
                        : ""
                    }
                    onchange="
                        toggleTask(
                            ${index}
                        )
                    ">

                <b>
                    ${task.text}
                </b>

            </div>

            <br>

            📅 締切：
            ${
                task.deadline
                || "未設定"
            }

            <br><br>

            優先度：

            <span
                class="badge">

                ${
                    priorityText(
                        task.priority
                    )
                }

            </span>

            <br><br>

            <button
                onclick="
                deleteTask(
                    ${index}
                )">

                🗑 削除

            </button>

        </div>
        `;
    });

    updateAI();
}

// =========================
// イベント
// =========================
addBtn.addEventListener(
    "click",
    addTask
);

taskInput.addEventListener(
    "keypress",
    e=>{
        if(
            e.key ===
            "Enter"
        ){
            addTask();
        }
    }
);
// =========================
// AIスコア計算
// =========================
function getAIScore(task){

    let score = 0;

    // 優先度
    score += task.priority * 20;

    // 締切が近いほど加点
    if(task.deadline){

        const today =
            new Date();

        const deadline =
            new Date(task.deadline);

        const diff =
            Math.ceil(
                (deadline - today)
                /(1000*60*60*24)
            );

        score +=
            Math.max(
                0,
                30 - diff
            );
    }

    return score;
}

// =========================
// 達成率
// =========================
function getCompletionRate(){

    if(tasks.length === 0){
        return 0;
    }

    const completed =
        tasks.filter(
            t=>t.completed
        ).length;

    return Math.round(
        completed /
        tasks.length *
        100
    );
}

// =========================
// レベル判定
// =========================
function getLevel(rate){

    if(rate >= 90){
        return "🏆 Master";
    }

    if(rate >= 70){
        return "⭐ Advanced";
    }

    if(rate >= 40){
        return "📘 Intermediate";
    }

    return "🌱 Beginner";
}

// =========================
// AIおすすめ課題
// =========================
function getRecommendedTasks(){

    return tasks
        .filter(
            t=>!t.completed
        )
        .sort(
            (a,b)=>
                getAIScore(b)
                -
                getAIScore(a)
        );
}

// =========================
// AIアドバイス
// =========================
function getAdvice(){

    const recommend =
        getRecommendedTasks();

    if(
        recommend.length === 0
    ){
        return `
        すべての課題が
        完了しています！
        `;
    }

    const top =
        recommend[0];

    return `
    「${top.text}」
    を優先してください。
    `;
}

// =========================
// 締切通知
// =========================
function getUrgentTasks(){

    return tasks.filter(
        task=>{

        if(
            task.completed
        ){
            return false;
        }

        if(
            !task.deadline
        ){
            return false;
        }

        const diff =
            Math.ceil(
                (
                    new Date(
                        task.deadline
                    )
                    -
                    new Date()
                )
                /86400000
            );

        return diff <= 1;
    });
}

// =========================
// 学習スコア
// =========================
function getLearningScore(){

    const rate =
        getCompletionRate();

    const completed =
        tasks.filter(
            t=>t.completed
        ).length;

    return Math.min(
        100,
        rate +
        completed * 5
    );
}

// =========================
// 週間予測
// =========================
function getForecast(){

    const remain =
        tasks.filter(
            t=>!t.completed
        ).length;

    if(remain === 0){
        return `
        すべて完了しています！
        `;
    }

    const days =
        Math.ceil(
            remain / 2
        );

    return `
    今のペースなら
    約${days}日で
    完了予定です。
    `;
}

// =========================
// AI更新
// =========================
function updateAI(){

    const rate =
        getCompletionRate();

    document
        .getElementById(
            "completionRate"
        )
        .innerText =
        rate + "%";

    document
        .getElementById(
            "learningScore"
        )
        .innerText =
        getLearningScore()
        + "点";

    document
        .getElementById(
            "userLevel"
        )
        .innerText =
        getLevel(rate);

    document
        .getElementById(
            "forecast"
        )
        .innerText =
        getForecast();

    // 今日やるべき課題
    const recommend =
        getRecommendedTasks();

    document
        .getElementById(
            "todayTasks"
        )
        .innerHTML =
        recommend.length
        ?
        recommend
        .slice(0,3)
        .map(
            (t,i)=>
            `
            ${i+1}.
            ${t.text}
            `
        )
        .join("<br>")
        :
        "課題なし";

    // AIアドバイス
    document
        .getElementById(
            "aiAdvice"
        )
        .innerText =
        getAdvice();

    // 締切通知
    const urgent =
        getUrgentTasks();

    document
        .getElementById(
            "urgentTasks"
        )
        .innerHTML =
        urgent.length
        ?
        urgent
        .map(
            t=>
            `
            ⚠
            ${t.text}
            (${t.deadline})
            `
        )
        .join("<br>")
        :
        "緊急の課題はありません";

    drawChart(rate);

    renderCalendar();
}
// =========================
// 円グラフ
// =========================
function drawChart(rate){

    function drawChart(rate){

    const canvas =
        document.getElementById(
            "progressChart"
        );

    if(!canvas){
        return;
    }

    const ctx =
        canvas.getContext("2d");

    if(!ctx){
        return;
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // 背景円
    ctx.beginPath();
    ctx.arc(
        125,
        125,
        90,
        0,
        Math.PI * 2
    );
    ctx.lineWidth = 15;
    ctx.strokeStyle = "#e5e7eb";
    ctx.stroke();

    // 達成率
    ctx.beginPath();
    ctx.arc(
        125,
        125,
        90,
        -Math.PI / 2,
        (
            rate / 100
        ) *
        Math.PI *
        2 -
        Math.PI / 2
    );

    ctx.strokeStyle =
        "#4f46e5";

    ctx.lineWidth = 15;
    ctx.stroke();

    ctx.fillStyle =
        "#111827";

    ctx.font =
        "28px Arial";

    ctx.textAlign =
        "center";

    ctx.fillText(
        rate + "%",
        125,
        135
    );
}}

// =========================
// カレンダー
// =========================
function renderCalendar(){

    const calendar =
        document.getElementById(
            "calendar"
        );

    const data =
        tasks
        .filter(
            t =>
            !t.completed
        )
        .sort(
            (a,b)=>
                new Date(
                    a.deadline ||
                    "9999-12-31"
                )
                -
                new Date(
                    b.deadline ||
                    "9999-12-31"
                )
        );

    if(
        data.length === 0
    ){
        calendar.innerHTML =
            "課題なし";
        return;
    }

    calendar.innerHTML =
        data
        .map(
            t =>
            `
            📅
            ${t.deadline || "未設定"}
            <br>
            ${t.text}
            <br><br>
            `
        )
        .join("");
}

// =========================
// QR共有
// =========================
function utf8_to_b64(str){

    return btoa(
        encodeURIComponent(
            str
        ).replace(
            /%([0-9A-F]{2})/g,
            function(
                match,
                p1
            ){
                return String
                .fromCharCode(
                    "0x"+p1
                );
            }
        )
    );
}

function generateShareUrl(){

    if(
        tasks.length === 0
    ){
        alert(
            "共有する課題がありません"
        );
        return;
    }

    const data =
        utf8_to_b64(
            JSON.stringify(
                tasks
            )
        );

    const url =
        location.origin +
        location.pathname +
        "?import=" +
        data;

    return url;
}

function copyLink(){

    const url =
        generateShareUrl();

    if(!url){
        return;
    }

    navigator
        .clipboard
        .writeText(url);

    alert(
        "リンクをコピーしました！"
    );
}

// =========================
// URLから読み込み
// =========================
function checkImport(){

    const params =
        new URLSearchParams(
            location.search
        );

    const data =
        params.get(
            "import"
        );

    if(
        !data
    ){
        return;
    }

    try{

        const json =
            decodeURIComponent(
                escape(
                    atob(data)
                )
            );

        const imported =
            JSON.parse(
                json
            );

        if(
            confirm(
                imported.length +
                "件の課題を読み込みますか？"
            )
        ){

            tasks =
                tasks.concat(
                    imported
                );

            saveTasks();

            renderTasks();
        }

    }catch(e){

        alert(
            "読み込みに失敗しました"
        );
    }
}

// =========================
// 共有ボタン追加
// =========================
const shareBtn =
document.createElement(
    "button"
);

shareBtn.innerText =
"📱 リンク共有";

shareBtn.onclick =
copyLink;

document
.querySelector(
    ".nav"
)
.appendChild(
    shareBtn
);

// =========================
// 初期処理
// =========================
window.onload = () => {

    document
        .getElementById(
            "taskPage"
        )
        .style.display =
        "block";

    renderTasks();
    checkImport();
    updateAI();
};

</script>

</body>
</html>
